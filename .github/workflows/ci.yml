name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: fmt, clippy, test, doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The CLI's default `fido2` feature builds ctap-hid-fido2/hidapi, which need
      # the USB-HID system libraries (`--all-features` below enables it).
      - name: Install FIDO2 build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

      - name: Docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: build on MSRV (1.87)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@1.87.0
      # The CLI's default `fido2` feature builds ctap-hid-fido2/hidapi (USB-HID).
      - name: Install FIDO2 build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-features

  features:
    name: feature matrix (revolutx)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      # The REST tree must stay optional: each non-default config must compile
      # cleanly (no dead code) so a FIX-only consumer can drop reqwest/Ed25519.
      - name: models only (--no-default-features)
        run: cargo clippy -p revolutx --no-default-features -- -D warnings
      - name: fix only
        run: cargo clippy -p revolutx --no-default-features --features fix -- -D warnings
      - name: agent only
        run: cargo clippy -p revolutx --no-default-features --features agent --all-targets -- -D warnings
      - name: all features
        run: cargo clippy -p revolutx --all-features -- -D warnings

  coverage:
    name: code coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      # The CLI's default `fido2` feature builds ctap-hid-fido2/hidapi (USB-HID).
      - name: Install FIDO2 build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage (library code only)
        run: |
          mkdir -p coverage
          cargo llvm-cov --all-features --workspace \
            --ignore-filename-regex '(^|/)tests/' \
            --cobertura --output-path coverage/cobertura.xml

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage/cobertura.xml | head -1 | awk '{printf "%.1f", $1 * 100}')
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master'
        run: |
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/coverage-${{ steps.coverage.outputs.percentage }}%25-${{ steps.coverage.outputs.color }}" > .github/badges/coverage.svg

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/master'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/coverage.svg
          git diff --staged --quiet || git commit -m "Update coverage badge [skip ci]"
          git pull --rebase
          git push
